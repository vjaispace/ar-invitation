<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<!-- START BUTTON -->

<div id="overlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
">

<button id="startBtn" style="
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;">
Tap to Start Invitation
</button>

</div>

<a-scene
embedded
vr-mode-ui="enabled: false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;">

<a-assets>

<video id="video"
src="invitation.mp4"
autoplay
loop
muted
playsinline
preload="auto"
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">

</a-assets>

<a-camera gps-camera rotation-reader></a-camera>

<!-- VIDEO IN REAL WORLD -->

<a-plane
id="videoPlane"
position="0 0 -2"
rotation="-90 0 0"
width="2"
height="3"
material="shader: flat; src: #video">
</a-plane>

<!-- PETALS -->

<a-entity id="petals"></a-entity>

</a-scene>

<script>

/* START BUTTON */

const video = document.querySelector("#video");
const overlay = document.querySelector("#overlay");
const btn = document.querySelector("#startBtn");

btn.onclick = () => {

video.muted = false;
video.play();

overlay.style.display = "none";

};

/* PETALS */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");

p.setAttribute("scale","0.2 0.2 0.2");

p.setAttribute("position",{
x:(Math.random()*2)-1,
y:2+Math.random()*2,
z:-1-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*2)-1} -1 ${-1-Math.random()*2}`,
dur:3000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);

}

</script>

</body>
</html>
