<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

/* ROUND BUTTON STYLE */
.btn-circle {
  width:120px;
  height:120px;
  border-radius:50%;
  font-size:16px;
  border:none;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* AR BUTTON */
#arBtn {
  background:#d4af37;
  color:white;
  box-shadow:0 0 20px rgba(212,175,55,0.6);
}

/* WEBSITE BUTTON */
#webBtn {
  background:white;
  color:black;
  box-shadow:0 0 15px rgba(255,255,255,0.5);
}

</style>

</head>

<body>

<!-- OVERLAY WITH TWO BUTTONS -->

<div id="overlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
gap:20px;
">

<button id="arBtn" class="btn-circle">AR</button>
<button id="webBtn" class="btn-circle">Website</button>

</div>

<!-- SCENE -->

<a-scene id="scene" style="display:none;">

<a-assets>

<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous"
preload="auto">
</video>

<img id="petal" src="petal.png">
<img id="bg" src="bg.jpeg">


</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<!-- BACKGROUND -->
<a-sky src="#bg" rotation="0 -90 0"></a-sky>

<a-entity id="container" position="0 1.6 -3">

<a-video
src="#video"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

/* ELEMENTS */

const video = document.querySelector("#video");
const overlay = document.querySelector("#overlay");
const scene = document.querySelector("#scene");

const arBtn = document.querySelector("#arBtn");
const webBtn = document.querySelector("#webBtn");

/* AR BUTTON */

arBtn.onclick = async () => {

  overlay.style.display = "none";
  scene.style.display = "block";

  try {
    video.muted = true;
    await video.play();

    setTimeout(() => {
      video.muted = false;
    }, 500);

  } catch (e) {
    alert("Tap again to start video");
  }

};

/* WEBSITE BUTTON */

webBtn.onclick = () => {

  window.open("https://s-weds-r.my.canva.site/", "_blank");

};

/* PETALS EFFECT (FIXED POSITION) */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);

}

</script>

</body>
</html>
