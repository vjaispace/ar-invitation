<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<a-scene>

<a-assets>

<video id="invitevideo"
src="invitation.mp4"
autoplay
loop
muted
playsinline
preload="auto"
crossorigin="anonymous">
</video>

<img id="petalimg" src="petal.png">

</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="container"
position="0 1.4 -3"
scale="1 1 1"
animation="property: position; to: 0 1.8 -3; dur: 4000; dir: alternate; loop: true">

<a-video
src="#invitevideo"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const container = document.querySelector('#petals');

for(let i=0;i<35;i++){

let petal = document.createElement('a-image');

petal.setAttribute('src','#petalimg');

petal.setAttribute('scale','0.15 0.15 0.15');

petal.setAttribute('position',{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

petal.setAttribute('animation',{
property:'position',
to:`${(Math.random()*4)-2} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

petal.setAttribute('animation__rotate',
'property: rotation; to: 0 360 360; dur: 3000; loop: true');

container.appendChild(petal);}

const video = document.querySelector("#invitevideo");
const plane = document.querySelector("#invitePlane");

video.addEventListener("loadedmetadata", () => {

let ratio = video.videoWidth / video.videoHeight;

let width = 3;
let height = width / ratio;

plane.setAttribute("width", width);
plane.setAttribute("height", height);

});

</script>

<script>

const video = document.querySelector("#invitevideo");

document.addEventListener("click", function () {
    video.play();
});

window.addEventListener("load", function () {
    video.play();
});

</script>

</body>
</html>
