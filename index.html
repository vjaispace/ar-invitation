<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<!-- START BUTTON -->

<div id="overlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
">

<button id="startBtn" style="
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;">
Tap to Open Invitation
</button>

</div>

<!-- SCENE -->

<a-scene id="scene" style="display:none;" background="color: black">

<a-assets>

<a-sky id="sky" color="#000"></a-sky>

<a-entity id="stars"></a-entity>

<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous"
preload="auto">
</video>

<img id="petal" src="petal.png">

</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="container" position="0 1.6 -3">

<a-video
src="#video"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const video = document.querySelector("#video");
const overlay = document.querySelector("#overlay");
const btn = document.querySelector("#startBtn");
const scene = document.querySelector("#scene");

btn.onclick = async () => {

  overlay.style.display = "none";
  scene.style.display = "block";

  try {
    video.muted = true;
    await video.play();

    // Small delay improves Safari rendering
    setTimeout(() => {
      video.muted = false;
    }, 500);

  } catch (e) {
    alert("Tap again to start video");
  }

};

<script>

/* PETALS */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);

}

</script>

<script>
const isWebXRSupported = navigator.xr !== undefined;

if (!isWebXRSupported) {
  alert("AR mode is limited on this browser. Opening alternative view.");
}
</script>

<script>

/* STARS BACKGROUND */

const stars = document.querySelector("#stars");

for(let i=0;i<120;i++){

let star = document.createElement("a-sphere");

star.setAttribute("radius","0.01");

star.setAttribute("position",{
x:(Math.random()*10)-5,
y:(Math.random()*6),
z:(Math.random()*-10)
});

star.setAttribute("material","color: white; emissive: white;");

star.setAttribute("animation",{
property:"material.emissiveIntensity",
from:0.2,
to:1,
dur:1000+Math.random()*2000,
dir:"alternate",
loop:true
});

stars.appendChild(star);

}

</script>

</body>
</html>
