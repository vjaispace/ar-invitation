<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<a-scene>

<a-assets>

<video id="invitevideo"
src="invitation.mp4"
autoplay
loop
muted
playsinline
preload="auto"
crossorigin="anonymous">
</video>

<img id="petalimg" src="petal.png">

</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="container"
position="0 1.4 -3"
scale="1 1 1"
animation="property: position; to: 0 1.8 -3; dur: 4000; dir: alternate; loop: true">

<a-video
id="invitePlane"
src="#invitevideo"
width="3"
height="2"
material="shader: flat">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

/* FLOWER PETALS */

const petals=document.querySelector("#petals");

for(let i=0;i<40;i++){

let p=document.createElement("a-image");

p.setAttribute("src","#petalimg");

p.setAttribute("scale","0.2 0.2 0.2");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*4)-2} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);

}


/* TOUCH CONTROLS */

const object=document.querySelector("#container");

let startX=0;
let startY=0;
let startDist=0;
let currentScale=1;

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;
let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}

document.addEventListener("touchstart",e=>{

if(e.touches.length==1){

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1]);

}

});

document.addEventListener("touchmove",e=>{

/* ROTATE */

if(e.touches.length==1){

let dx=e.touches[0].clientX-startX;
let dy=e.touches[0].clientY-startY;

object.object3D.rotation.y+=dx*0.005;

object.object3D.position.y+=dy*-0.002;

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;

}

/* ZOOM */

if(e.touches.length==2){

let dist=getDistance(e.touches[0],e.touches[1]);

let scale=currentScale*(dist/startDist);

object.setAttribute("scale",`${scale} ${scale} ${scale}`);

}

});

document.addEventListener("touchend",e=>{

let s=object.getAttribute("scale");

currentScale=s.x;

});

<script>

const video = document.querySelector("#invitevideo");
const plane = document.querySelector("#invitePlane");

video.addEventListener("loadedmetadata", () => {

let ratio = video.videoWidth / video.videoHeight;

let width = 3;
let height = width / ratio;

plane.setAttribute("width", width);
plane.setAttribute("height", height);

});

</script>

</body>
</html>
