<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

/* start overlay */

#startOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.65);
z-index:9999;
}

#startButton{
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- TAP START SCREEN -->

<div id="startOverlay">

<button id="startButton">
Tap to Open Wedding Invitation
</button>

</div>


<!-- AR SCENE -->

<a-scene background="color:#111">

<a-assets>

<video
id="invitevideo"
src="invitation.mp4"
autoplay
loop
muted
playsinline
preload="auto"
crossorigin="anonymous">
</video>

<img id="petalimg" src="petal.png">

</a-assets>


<a-camera position="0 1.6 0"></a-camera>


<!-- VIDEO CONTAINER -->

<a-entity id="container" position="0 1.6 -3">

<a-video
src="#invitevideo"
width="1.5"
height="2.7"
material="shader:flat">
</a-video>

</a-entity>


<a-entity id="petals"></a-entity>

</a-scene>



<script>

/* START BUTTON */

const video = document.querySelector("#invitevideo")
const overlay = document.querySelector("#startOverlay")
const button = document.querySelector("#startButton")

function startExperience(){

video.muted = false
video.play()

overlay.style.display = "none"

}

button.addEventListener("click", startExperience)
button.addEventListener("touchstart", startExperience)



/* FLOWER PETALS */

const petals = document.querySelector("#petals")

for(let i=0;i<35;i++){

let p = document.createElement("a-image")

p.setAttribute("src","#petalimg")

p.setAttribute("scale","0.15 0.15 0.15")

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
})

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
})

petals.appendChild(p)

}



/* TOUCH INTERACTION */

const object = document.querySelector("#container")

let startX = 0
let startY = 0
let startDist = 0
let currentScale = 1

function distance(t1,t2){

let dx = t1.clientX - t2.clientX
let dy = t1.clientY - t2.clientY

return Math.sqrt(dx*dx + dy*dy)

}

document.addEventListener("touchstart", e=>{

if(e.touches.length===1){

startX = e.touches[0].clientX
startY = e.touches[0].clientY

}

if(e.touches.length===2){

startDist = distance(e.touches[0],e.touches[1])

}

})


document.addEventListener("touchmove", e=>{

if(e.touches.length===1){

let dx = e.touches[0].clientX - startX
let dy = e.touches[0].clientY - startY

object.object3D.rotation.y += dx*0.005
object.object3D.position.y += dy*-0.002

startX = e.touches[0].clientX
startY = e.touches[0].clientY

}


if(e.touches.length===2){

let dist = distance(e.touches[0],e.touches[1])

let scale = currentScale*(dist/startDist)

object.setAttribute("scale",`${scale} ${scale} ${scale}`)

}

})


document.addEventListener("touchend",()=>{

let s = object.getAttribute("scale")

currentScale = s.x

})

</script>

</body>
</html>
