<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#playButton{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:14px 28px;
font-size:18px;
background:#c59d5f;
color:white;
border:none;
border-radius:8px;
z-index:999;
}
</style>

</head>

<body>

<button id="playButton">Tap to Play Invitation</button>

<a-scene>

<a-assets>

<video id="invitevideo"
src="invitation.mp4"
loop
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">

</a-assets>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

<a-entity orbit-controls="target: #card; enableZoom: true"></a-entity>

<a-video
id="card"
src="#invitevideo"
width="1.2"
height="2.1"
position="0 1.6 -3"
material="shader: flat">
</a-video>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const video = document.querySelector("#invitevideo");
const button = document.querySelector("#playButton");

button.onclick = function(){

video.play();
button.style.display="none";

};

const container = document.querySelector('#petals');

for(let i=0;i<35;i++){

let petal = document.createElement('a-image');

petal.setAttribute('src','#petal');

petal.setAttribute('scale','0.25 0.25 0.25');

petal.setAttribute('position',{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

petal.setAttribute('animation',{
property:'position',
to:`${(Math.random()*4)-2} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

container.appendChild(petal);

}

</script>

</body>
</html>
