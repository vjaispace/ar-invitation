<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

<a-assets>

<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">

</a-assets>

<!-- MARKER A -->
<a-marker type="pattern" url="English_invite.patt" id="markerA">

<a-video
src="#video"
width="1.5"
height="2.7"
position="0 1 0">
</a-video>

<a-entity id="petalsA"></a-entity>

</a-marker>

<!-- MARKER B -->
<a-marker type="pattern" url="Tamil_invite.patt" id="markerB">

<a-video
src="#video"
width="1.5"
height="2.7"
position="0 1 0">
</a-video>

<a-entity id="petalsB"></a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

/* VIDEO CONTROL */

const video = document.querySelector("#video");

const markerA = document.querySelector("#markerA");
const markerB = document.querySelector("#markerB");

let isPlaying = false;

function playVideo() {
  if (!isPlaying) {
    video.muted = true;
    video.play().catch(()=>{});
    setTimeout(()=>{ video.muted = false; }, 500);
    isPlaying = true;
  }
}

function pauseVideo() {
  video.pause();
  isPlaying = false;
}

markerA.addEventListener("markerFound", playVideo);
markerB.addEventListener("markerFound", playVideo);

markerA.addEventListener("markerLost", pauseVideo);
markerB.addEventListener("markerLost", pauseVideo);

/* PETALS FUNCTION */

function createPetals(containerId) {

  const container = document.querySelector(containerId);

  for(let i=0;i<30;i++){

    let p = document.createElement("a-image");

    p.setAttribute("src","#petal");
    p.setAttribute("scale","0.15 0.15 0.15");

    p.setAttribute("position",{
      x:(Math.random()*2)-1,
      y:2+Math.random(),
      z:(Math.random()*2)-1
    });

    p.setAttribute("animation",{
      property:"position",
      to:`${(Math.random()*2)-1} -1 ${(Math.random()*2)-1}`,
      dur:4000+Math.random()*2000,
      loop:true
    });

    p.setAttribute("animation__spin",
      "property: rotation; to: 0 360 360; dur: 3000; loop: true");

    container.appendChild(p);
  }
}

/* CREATE PETALS FOR BOTH MARKERS */

createPetals("#petalsA");
createPetals("#petalsB");

</script>

</body>
</html>
