<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
}

#startBtn{
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<!-- START SCREEN -->

<div id="overlay">
<button id="startBtn">Tap to Open Invitation</button>
</div>

<!-- AFRAME SCENE -->

<a-scene
embedded
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: true"
renderer="logarithmicDepthBuffer: true;"
>

<a-assets>

<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">

</a-assets>

<!-- CAMERA -->

<a-entity camera look-controls="enabled: true"></a-entity>

<!-- VIDEO IN FRONT -->

<a-video
id="mainVideo"
src="#video"
position="0 0 -2"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>

<!-- PETALS -->

<a-entity id="petals"></a-entity>

</a-scene>

<script>

/* BUTTON + CAMERA START */

const video = document.querySelector("#video");
const overlay = document.querySelector("#overlay");
const btn = document.querySelector("#startBtn");

btn.onclick = async () => {

overlay.style.display = "none";

/* START CAMERA (iPhone fix) */
try {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
} catch(e) {
  alert("Please allow camera access");
}

/* START VIDEO */
video.muted = false;
video.play();

};

/* PETALS EFFECT */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);

}

</script>

</body>
</html>
