<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<button id="startButton" style="
position:absolute;
z-index:999;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 28px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
">
Tap to Open Wedding Invitation
</button>

<a-scene background="color: #111">

<a-assets>

<video id="invitevideo"
src="invitation.mp4"
loop
playsinline
preload="auto"
crossorigin="anonymous">
</video>

<img id="petalimg" src="petal.png">

</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-video
src="#invitevideo"
width="1.5"
height="2.7"
position="0 1.6 -3"
material="shader: flat">
</a-video>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const container = document.querySelector('#petals');

for(let i=0;i<35;i++){

let petal = document.createElement('a-image');

petal.setAttribute('src','#petalimg');

petal.setAttribute('scale','0.15 0.15 0.15');

petal.setAttribute('position',{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

petal.setAttribute('animation',{
property:'position',
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

container.appendChild(petal);

}

</script>

<script>

const object = document.querySelector("#container");

let startX = 0;
let startY = 0;
let startDist = 0;
let currentScale = 1;

function getDistance(t1,t2){

let dx = t1.clientX - t2.clientX;
let dy = t1.clientY - t2.clientY;

return Math.sqrt(dx*dx + dy*dy);

}

document.addEventListener("touchstart", e => {

if(e.touches.length == 1){

startX = e.touches[0].clientX;
startY = e.touches[0].clientY;

}

if(e.touches.length == 2){

startDist = getDistance(e.touches[0], e.touches[1]);

}

});

document.addEventListener("touchmove", e => {

if(e.touches.length == 1){

let dx = e.touches[0].clientX - startX;
let dy = e.touches[0].clientY - startY;

object.object3D.rotation.y += dx * 0.005;
object.object3D.position.y += dy * -0.002;

startX = e.touches[0].clientX;
startY = e.touches[0].clientY;

}

if(e.touches.length == 2){

let dist = getDistance(e.touches[0], e.touches[1]);

let scale = currentScale * (dist / startDist);

object.setAttribute("scale", scale + " " + scale + " " + scale);

}

});

document.addEventListener("touchend", () => {

let s = object.getAttribute("scale");
currentScale = s.x;

});

</script>

<script>

const video = document.querySelector("#invitevideo");

document.addEventListener("click", function () {
    video.play();
});

window.addEventListener("load", function () {
    video.play();
});

</script>

<script>

const video = document.querySelector("#invitevideo");
const button = document.querySelector("#startButton");

button.addEventListener("click", function(){

video.muted = false;
video.play();

/* hide button completely */

button.style.display = "none";

/* allow touches to pass to AR scene */

document.body.style.pointerEvents = "auto";

});

</script>

</body>
</html>
