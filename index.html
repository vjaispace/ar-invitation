<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
}
#startBtn{
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<div id="overlay">
<button id="startBtn">Tap to Open Invitation</button>
</div>

<a-scene
id="scene"
embedded
xr-mode-ui="enabled: true"
renderer="logarithmicDepthBuffer: true;"
vr-mode-ui="enabled: true"
style="display:none;"
>

<a-assets>
<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
<img id="petal" src="petal.png">
</a-assets>

<!-- SKY -->
<a-sky id="sky" color="#000"></a-sky>
<a-entity id="stars"></a-entity>

<!-- CAMERA -->
<a-camera position="0 1.6 0"></a-camera>

<!-- MAIN OBJECT (PLACED AFTER TAP) -->
<a-entity id="placement" visible="false">

<a-video id="mainVideo"
src="#video"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const video = document.querySelector("#video");
const overlay = document.querySelector("#overlay");
const btn = document.querySelector("#startBtn");
const scene = document.querySelector("#scene");
const placement = document.querySelector("#placement");

/* START */

btn.onclick = async () => {
  overlay.style.display = "none";
  scene.style.display = "block";

  try {
    video.muted = true;
    await video.play();

    setTimeout(()=>{ video.muted=false; },500);
  } catch(e){}
};

/* HIDE SKY IN AR */

scene.addEventListener("enter-vr", () => {
  if (scene.is("ar-mode")) {
    document.querySelector("#sky").setAttribute("visible","false");
    document.querySelector("#stars").setAttribute("visible","false");
  }
});

/* TAP TO PLACE */

scene.addEventListener("click", function () {

  if (!scene.is("ar-mode")) return;

  const cam = document.querySelector("[camera]");
  const direction = new THREE.Vector3();
  cam.object3D.getWorldDirection(direction);

  const position = cam.object3D.position.clone();
  position.add(direction.multiplyScalar(2));

  placement.setAttribute("position", position);
  placement.setAttribute("visible", true);

});

/* ===== GESTURES ===== */

let isDragging = false;
let previousX = 0;

window.addEventListener("touchstart", (e)=>{
  if(e.touches.length==1){
    isDragging=true;
    previousX=e.touches[0].clientX;
  }
});

window.addEventListener("touchmove", (e)=>{
  if(!isDragging) return;

  let deltaX = e.touches[0].clientX - previousX;
  previousX = e.touches[0].clientX;

  let rot = placement.getAttribute("rotation");
  rot.y += deltaX * 0.5;

  placement.setAttribute("rotation", rot);
});

window.addEventListener("touchend", ()=>{
  isDragging=false;
});

/* PINCH ZOOM */

let initialDistance = null;

window.addEventListener("touchmove", (e)=>{
  if(e.touches.length==2){

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let distance = Math.sqrt(dx*dx+dy*dy);

    if(!initialDistance) initialDistance = distance;

    let scale = placement.getAttribute("scale");

    let factor = distance / initialDistance;

    placement.setAttribute("scale", {
      x: factor,
      y: factor,
      z: factor
    });

  }
});

window.addEventListener("touchend", ()=>{
  initialDistance=null;
});

/* STARS */

const stars = document.querySelector("#stars");

for(let i=0;i<120;i++){
let star = document.createElement("a-sphere");
star.setAttribute("radius","0.01");
star.setAttribute("position",{
x:(Math.random()*10)-5,
y:(Math.random()*6),
z:(Math.random()*-10)
});
star.setAttribute("material","color:white; emissive:white;");
star.setAttribute("animation",{
property:"material.emissiveIntensity",
from:0.2,
to:1,
dur:1000+Math.random()*2000,
dir:"alternate",
loop:true
});
stars.appendChild(star);
}

/* PETALS */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){
let p = document.createElement("a-image");
p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);
}

</script>

</body>
</html>
