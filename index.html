<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<a-scene>

<a-assets>

<video id="invitevideo"
src="invitation.mp4"
autoplay
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">

</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<!-- Portrait video -->
<a-video
src="#invitevideo"
width="1.8"
height="3.2"
position="0 1.6 -3"
material="shader: flat">
</a-video>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const container = document.querySelector('#petals');

for(let i=0;i<30;i++){

let petal = document.createElement('a-image');

petal.setAttribute('src','#petal');

petal.setAttribute('scale','0.25 0.25 0.25');

petal.setAttribute('position',{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

petal.setAttribute('animation',{
property:'position',
to:`${(Math.random()*4)-2} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

container.appendChild(petal);

}

</script>

</body>
</html>
