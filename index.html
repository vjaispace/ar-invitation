<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

/* ROUND BUTTON STYLE */
.btn-circle {
  width:120px;
  height:120px;
  border-radius:50%;
  font-size:16px;
  border:none;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* AR BUTTON */
#arBtn {
  background:#d4af37;
  color:white;
  box-shadow:0 0 20px rgba(212,175,55,0.6);
}

/* WEBSITE BUTTON */
#webBtn {
  background:white;
  color:black;
  box-shadow:0 0 15px rgba(255,255,255,0.5);
}
</style>

</head>

<body>

<!-- OVERLAY -->

<div id="overlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
gap:20px;
">

<button id="arBtn" class="btn-circle">AR</button>
<button id="webBtn" class="btn-circle">Website</button>

</div>

<!-- AR SCENE -->

<a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: true;">

<a-assets>

<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous"
preload="auto" autoplay muted>
</video>

<img id="petal" src="petal.png">

</a-assets>

<a-camera></a-camera>

<!-- TAMIL MARKER -->e
<a-marker type="pattern" url="Tamil_invite.patt" id="markerTamil">

<a-video
src="#video"
width="1.5"
height="2.7"
position="0 1 0">
</a-video>

<a-entity id="petalsTamil"></a-entity>

</a-marker>

<!-- ENGLISH MARKER -->
<a-marker type="pattern" url="English_invite.patt" id="markerEnglish">

<a-video
src="#video"
width="1.5"
height="2.7"
position="0 1 0">
</a-video>

<a-entity id="petalsEnglish"></a-entity>

</a-marker>

</a-scene>

<script>

/* ELEMENTS */

const video = document.querySelector("#video");
const overlay = document.querySelector("#overlay");
const scene = document.querySelector("#scene");

const arBtn = document.querySelector("#arBtn");
const webBtn = document.querySelector("#webBtn");

const markerTamil = document.querySelector("#markerTamil");
const markerEnglish = document.querySelector("#markerEnglish");

let isPlaying = false;

/* AR BUTTON */

arBtn.onclick = () => {

  overlay.style.display = "none";
  scene.style.display = "block";

};

/* WEBSITE BUTTON */

webBtn.onclick = () => {
  window.open("https://s-weds-r.my.canva.site/", "_blank");
};

/* VIDEO CONTROL */

function playVideo() {
  if (!isPlaying) {
    video.muted = true;
    video.play().catch(()=>{});
    setTimeout(()=>{ video.muted = false; }, 500);
    isPlaying = true;
  }
}

function pauseVideo() {
  video.pause();
  isPlaying = false;
}

markerTamil.addEventListener("markerFound", playVideo);
markerEnglish.addEventListener("markerFound", playVideo);

markerTamil.addEventListener("markerLost", pauseVideo);
markerEnglish.addEventListener("markerLost", pauseVideo);

/* PETALS FUNCTION */

function createPetals(containerId) {

  const container = document.querySelector(containerId);

  for(let i=0;i<35;i++){

    let p = document.createElement("a-image");

    p.setAttribute("src","#petal");
    p.setAttribute("scale","0.15 0.15 0.15");

    p.setAttribute("position",{
      x:(Math.random()*4)-2,
      y:3+Math.random()*2,
      z:-2-Math.random()*2
    });

    p.setAttribute("animation",{
      property:"position",
      to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
      dur:4000+Math.random()*2000,
      loop:true
    });

    p.setAttribute("animation__spin",
    "property: rotation; to: 0 360 360; dur: 3000; loop: true");

    container.appendChild(p);
  }
}

/* CREATE PETALS */

createPetals("#petalsTamil");
createPetals("#petalsEnglish");

</script>

</body>
</html>
