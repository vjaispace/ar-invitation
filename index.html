<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
}

#startBtn{
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;
}

/* Fallback video */
#fallbackVideo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
display:none;
z-index:5;
}
</style>

</head>

<body>

<!-- START SCREEN -->
<div id="overlay">
<button id="startBtn">Tap to Open Invitation</button>
</div>

<!-- FALLBACK VIDEO (Safari etc) -->
<video id="fallbackVideo"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>

<!-- A-FRAME SCENE (for WebXR browsers) -->
<a-scene id="scene"
embedded
vr-mode-ui="enabled: true"
device-orientation-permission-ui="enabled: true"
style="display:none;"
>

<a-assets>
<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">
</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity position="0 1.6 -3">
<a-video
src="#video"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>
</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const btn = document.getElementById("startBtn");
const overlay = document.getElementById("overlay");

const scene = document.getElementById("scene");
const video = document.getElementById("video");
const fallbackVideo = document.getElementById("fallbackVideo");

/* Detect WebXR */
const isWebXRSupported = navigator.xr !== undefined;

btn.onclick = async () => {

  overlay.style.display = "none";

  if (isWebXRSupported) {

    /* ===== ANDROID / CHROME AR ===== */

    scene.style.display = "block";

    try {
      video.muted = true;
      await video.play();

      setTimeout(() => {
        video.muted = false;
      }, 500);

    } catch (e) {
      alert("Tap again to start AR");
    }

  } else {

    /* ===== SAFARI / FALLBACK ===== */

    fallbackVideo.style.display = "block";

    try {
      fallbackVideo.muted = true;
      await fallbackVideo.play();

      setTimeout(() => {
        fallbackVideo.muted = false;
      }, 500);

    } catch (e) {
      alert("Tap again to play video");
    }

  }

};

/* PETALS (only for A-Frame scene) */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);

}

</script>

</body>
</html>
