<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

</head>

<body>

<a-scene>

<a-assets>

<video id="invitevideo"
src="invitation.mp4"
autoplay
loop
muted
playsinline
crossorigin="anonymous">
</video>

<img id="petalimg" src="petal.png">

</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="invitationContainer"
position="0 1.4 -3"
animation="property: position; to: 0 1.8 -3; dur: 4000; dir: alternate; loop: true">

<a-video
src="#invitevideo"
width="3.2"
height="1.8"
material="shader: flat">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

/* FLOWER PETALS */

const container=document.querySelector('#petals');

for(let i=0;i<40;i++){

let petal=document.createElement('a-image');

petal.setAttribute('src','#petalimg');

petal.setAttribute('scale','0.2 0.2 0.2');

petal.setAttribute('position',{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

petal.setAttribute('animation',{
property:'position',
to:`${(Math.random()*4)-2} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

petal.setAttribute('animation__rotate',
'property: rotation; to: 0 360 360; dur: 3000; loop: true');

container.appendChild(petal);

}

/* TOUCH INTERACTION */

const invite=document.querySelector("#invitationContainer");

let startDist=0;
let startScale=1;

document.addEventListener("touchstart",(e)=>{

if(e.touches.length===2){

let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;

startDist=Math.sqrt(dx*dx+dy*dy);

}

});

document.addEventListener("touchmove",(e)=>{

if(e.touches.length===2){

let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;

let dist=Math.sqrt(dx*dx+dy*dy);

let scale=startScale*(dist/startDist);

invite.setAttribute("scale",scale+" "+scale+" "+scale);

}

});

let rotateStartX=0;

document.addEventListener("touchstart",(e)=>{

if(e.touches.length===1){

rotateStartX=e.touches[0].clientX;

}

});

document.addEventListener("touchmove",(e)=>{

if(e.touches.length===1){

let diff=e.touches[0].clientX-rotateStartX;

invite.object3D.rotation.y+=diff*0.005;

rotateStartX=e.touches[0].clientX;

}

});

</script>

</body>
</html>
