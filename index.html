<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

.btn-circle {
  width:120px;
  height:120px;
  border-radius:50%;
  font-size:16px;
  border:none;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#arBtn {
  background:#d4af37;
  color:white;
}

#webBtn {
  background:white;
  color:black;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
gap:20px;
">

<button id="arBtn" class="btn-circle">AR</button>
<button id="webBtn" class="btn-circle">Website</button>

</div>

<!-- AR SCENE -->
<a-scene
  id="scene"
  xr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  webxr="optionalFeatures: hit-test, local-floor"
  visible="false"
>

<a-assets>

<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="petal" src="petal.png">

</a-assets>

<!-- CAMERA -->
<a-camera position="0 1.6 0"></a-camera>

<!-- RETICLE -->
<a-entity id="reticle"
  geometry="primitive: ring; radiusInner: 0.08; radiusOuter: 0.1"
  material="color: white; shader: flat"
  rotation="-90 0 0"
  visible="false">
</a-entity>

<!-- INVITATION -->
<a-entity id="invitation" visible="false">

<a-video
src="#video"
width="1.5"
height="2.7"
position="0 1.5 0">
</a-video>

<a-entity id="petals"></a-entity>

</a-entity>

</a-scene>

<script>

const scene = document.querySelector("#scene");
const overlay = document.querySelector("#overlay");
const arBtn = document.querySelector("#arBtn");
const webBtn = document.querySelector("#webBtn");

const video = document.querySelector("#video");
const reticle = document.querySelector("#reticle");
const invitation = document.querySelector("#invitation");

/* OPEN AR */

arBtn.onclick = async () => {

  overlay.style.display = "none";
  scene.setAttribute("visible", "true");

  const xr = navigator.xr;

  if (!xr) {
    alert("AR not supported on this device");
    return;
  }

  const session = await xr.requestSession("immersive-ar", {
    requiredFeatures: ["hit-test", "local-floor"]
  });

  scene.renderer.xr.setSession(session);

};

/* PLACE OBJECT */

scene.addEventListener("click", () => {

  if (!reticle.object3D.visible) return;

  invitation.object3D.position.copy(reticle.object3D.position);
  invitation.setAttribute("visible", "true");

  video.play();

});

/* PETALS */

const petals = document.querySelector("#petals");

for(let i=0;i<30;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*2)-1,
y:2+Math.random(),
z:(Math.random()*2)-1
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*2)-1} -1 ${(Math.random()*2)-1}`,
dur:4000+Math.random()*2000,
loop:true
});

petals.appendChild(p);

}

</script>

</body>
</html>
