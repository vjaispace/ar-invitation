<!DOCTYPE html>
<html>
<head>
  <meta name="8thwall:renderer" content="aframe:1.4.2">
  <meta name="8thwall:package" content="@8thwall.xrextras">

  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe.min.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:10;
    }

    button {
      width:140px;
      height:140px;
      border-radius:50%;
      background:#d4af37;
      color:white;
      border:none;
      font-size:18px;
    }
  </style>
</head>

<body>

<div id="overlay">
  <button id="startBtn">Start AR</button>
</div>

<a-scene
  xrweb
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
>

<a-assets>
  <video id="video"
    src="invitation.mp4"
    loop
    muted
    playsinline
    crossorigin="anonymous">
  </video>

  <img id="petal" src="petal.png">
</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<!-- HIT TEST CURSOR -->
<a-entity
  id="cursor"
  xrextras-hittest-cursor
  raycaster="objects: .clickable"
  material="color: yellow"
  geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06">
</a-entity>

<!-- CONTENT -->
<a-entity id="content" visible="false">

  <a-video
    id="invite"
    class="clickable"
    src="#video"
    width="1.5"
    height="2.7"
    animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 800">
  </a-video>

  <a-entity id="petals"></a-entity>

</a-entity>

</a-scene>

<script>

/* COMPONENT */

AFRAME.registerComponent('tap-place', {
  init: function () {

    const cursor = document.querySelector('#cursor');
    const content = document.querySelector('#content');
    const video = document.querySelector('#video');
    const scene = this.el.sceneEl;

    let placed = false;

    scene.addEventListener('click', () => {

      if (!cursor.object3D.visible) {
        console.log("Move phone to detect surface");
        return;
      }

      const pos = cursor.object3D.position;

      if (!placed) {

        content.setAttribute('position', pos);
        content.setAttribute('visible', true);

        video.muted = true;
        video.play().catch(() => {});

        setTimeout(() => {
          video.muted = false;
        }, 500);

        createPetals();

        placed = true;
      }

    });
  }
});

/* PETALS FUNCTION */

function createPetals() {

  const petals = document.querySelector('#petals');

  for (let i = 0; i < 30; i++) {

    let p = document.createElement('a-image');

    p.setAttribute('src', '#petal');
    p.setAttribute('scale', '0.15 0.15 0.15');

    p.setAttribute('position', {
      x: (Math.random()*2)-1,
      y: 2 + Math.random(),
      z: (Math.random()*2)-1
    });

    p.setAttribute('animation', {
      property: 'position',
      to: `${(Math.random()*2)-1} -1 ${(Math.random()*2)-1}`,
      dur: 4000 + Math.random()*2000,
      loop: true
    });

    petals.appendChild(p);
  }
}

/* START BUTTON */

document.addEventListener('DOMContentLoaded', () => {

  const btn = document.getElementById('startBtn');
  const overlay = document.getElementById('overlay');
  const scene = document.querySelector('a-scene');

  btn.onclick = () => {

    overlay.style.display = 'none';

    // Wait until scene is ready
    scene.addEventListener('loaded', () => {
      scene.setAttribute('tap-place', '');
    });

  };

});

</script>

</body>
</html>
