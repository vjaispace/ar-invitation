<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
}

#startBtn{
padding:18px 30px;
font-size:18px;
background:#d4af37;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<div id="overlay">
<button id="startBtn">Tap to Open Invitation</button>
</div>

<a-scene
id="scene"
embedded
xr-mode-ui="enabled: true"
vr-mode-ui="enabled: true"
renderer="logarithmicDepthBuffer: true;"
style="display:none;"
>

<a-assets>
<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
<img id="petal" src="petal.png">
</a-assets>

<a-sky id="sky" color="#000"></a-sky>
<a-entity id="stars"></a-entity>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="placement" visible="false">
<a-video
src="#video"
width="1.5"
height="2.7"
material="shader: flat">
</a-video>
</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

const video = document.querySelector("#video");
const btn = document.querySelector("#startBtn");
const overlay = document.querySelector("#overlay");
const scene = document.querySelector("#scene");
const placement = document.querySelector("#placement");

/* START */

btn.onclick = async () => {

overlay.style.display="none";
scene.style.display="block";

try{
video.muted=true;
await video.play();

setTimeout(()=>{ video.muted=false; },500);

}catch(e){}

};

/* HIDE SKY IN AR */

scene.addEventListener("enter-vr", () => {
if(scene.is("ar-mode")){
document.querySelector("#sky").setAttribute("visible","false");
document.querySelector("#stars").setAttribute("visible","false");
}
});

/* TAP TO PLACE */

scene.addEventListener("click", () => {

if(!scene.is("ar-mode")) return;

const cam = document.querySelector("[camera]").object3D;

const direction = new THREE.Vector3();
cam.getWorldDirection(direction);

const position = cam.position.clone();
position.add(direction.multiplyScalar(2));

placement.setAttribute("position", position);
placement.setAttribute("visible", true);

});

/* ROTATE */

let dragging=false;
let prevX=0;

window.addEventListener("touchstart",(e)=>{
if(e.touches.length===1){
dragging=true;
prevX=e.touches[0].clientX;
}
});

window.addEventListener("touchmove",(e)=>{
if(!dragging) return;

let dx = e.touches[0].clientX - prevX;
prevX = e.touches[0].clientX;

let rot = placement.getAttribute("rotation");
rot.y += dx*0.5;

placement.setAttribute("rotation", rot);
});

window.addEventListener("touchend",()=> dragging=false);

/* ZOOM */

let startDist=null;

window.addEventListener("touchmove",(e)=>{
if(e.touches.length===2){

let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;
let dist=Math.sqrt(dx*dx+dy*dy);

if(!startDist) startDist=dist;

let scale = dist/startDist;

placement.setAttribute("scale",{x:scale,y:scale,z:scale});
}
});

window.addEventListener("touchend",()=> startDist=null);

/* STARS */

const stars = document.querySelector("#stars");

for(let i=0;i<120;i++){
let s=document.createElement("a-sphere");
s.setAttribute("radius","0.01");
s.setAttribute("position",{
x:(Math.random()*10)-5,
y:(Math.random()*6),
z:(Math.random()*-10)
});
s.setAttribute("material","color:white; emissive:white;");
s.setAttribute("animation",{
property:"material.emissiveIntensity",
from:0.2,
to:1,
dur:1000+Math.random()*2000,
dir:"alternate",
loop:true
});
stars.appendChild(s);
}

/* PETALS */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){
let p=document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

p.setAttribute("animation__spin",
"property: rotation; to: 0 360 360; dur: 3000; loop: true");

petals.appendChild(p);
}

</script>

</body>
</html>
