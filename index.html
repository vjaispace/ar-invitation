<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wedding AR Invite</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:20px;
  z-index:9999;
}

button {
  width:140px;
  height:140px;
  border-radius:50%;
  border:none;
  font-size:18px;
}

#arBtn {
  background:#d4af37;
  color:white;
}

#webBtn {
  background:white;
  color:black;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="arBtn">View Invitation</button>
  <button id="webBtn">Website</button>
</div>

<a-scene id="scene" style="display:none;" vr-mode-ui="enabled:false">

<a-assets>
<video id="video"
src="invitation.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>

<img id="petal" src="petal.png">
</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity position="0 1.6 -3">

<a-video
src="#video"
width="1.5"
height="2.7">
</a-video>

</a-entity>

<a-entity id="petals"></a-entity>

</a-scene>

<script>

/* DEVICE DETECTION */
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

/* ELEMENTS */
const arBtn = document.getElementById("arBtn");
const webBtn = document.getElementById("webBtn");
const overlay = document.getElementById("overlay");
const scene = document.getElementById("scene");
const video = document.getElementById("video");

/* AR BUTTON */

arBtn.onclick = async () => {

  if (isIOS) {
    // ✅ iPhone → Native AR
    window.location.href = "invitation.usdz";
    return;
  }

  // ✅ Android → Web AR / 3D
  overlay.style.display = "none";
  scene.style.display = "block";

  try {
    video.muted = true;
    await video.play();

    setTimeout(() => {
      video.muted = false;
    }, 500);

  } catch (e) {
    alert("Tap again");
  }

};

/* WEBSITE BUTTON */

webBtn.onclick = () => {
  window.open("https://rweds.my.canva.site/", "_blank");
};

/* PETALS */

const petals = document.querySelector("#petals");

for(let i=0;i<35;i++){

let p = document.createElement("a-image");

p.setAttribute("src","#petal");
p.setAttribute("scale","0.15 0.15 0.15");

p.setAttribute("position",{
x:(Math.random()*4)-2,
y:3+Math.random()*2,
z:-2-Math.random()*2
});

p.setAttribute("animation",{
property:"position",
to:`${(Math.random()*3)-1.5} -1 ${-2-Math.random()*2}`,
dur:4000+Math.random()*2000,
loop:true
});

petals.appendChild(p);
}

</script>

</body>
</html>
