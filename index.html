<!DOCTYPE html>
<html>
<head>
  <meta name="8thwall:renderer" content="aframe:1.4.2">
  <meta name="8thwall:package" content="@8thwall.xrextras">

  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe.min.js"></script>

  <script src="app.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:10;
    }

    button {
      width:140px;
      height:140px;
      border-radius:50%;
      background:#d4af37;
      color:white;
      border:none;
      font-size:18px;
    }
  </style>
</head>

<body>

<div id="overlay">
  <button id="startBtn">Start AR</button>
</div>

<a-scene
  xrweb
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
>

<a-assets>
  <video id="video"
    src="invitation.mp4"
    loop
    muted
    playsinline
    crossorigin="anonymous">
  </video>

  <img id="petal" src="petal.png">
</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<!-- HIT TEST CURSOR -->
<a-entity
  id="cursor"
  xrextras-hittest-cursor
  raycaster="objects: .clickable"
  material="color: yellow"
  geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06">
</a-entity>

<!-- CONTENT -->
<a-entity id="content" visible="false">

  <a-video
    id="invite"
    src="#video"
    width="1.5"
    height="2.7">
  </a-video>

  <a-entity id="petals"></a-entity>

</a-entity>

</a-scene>

</body>
</html>
